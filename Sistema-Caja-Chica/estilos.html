<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
  min-height: 100vh;
  padding: 20px;
}

.contenedor {
  width: 100%;
  max-width: 700px;
  margin: auto;
}

h2 {
  text-align: center;
  color: white;
  margin-bottom: 18px;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
}

.card,
form {
  background: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  color: #1e293b;
  font-size: 14px;
}

input,
select,
textarea {
  width: 100%;
  padding: 11px;
  margin-bottom: 15px;
  border: 2px solid #dbeafe;
  border-radius: 12px;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
  background: #f8fafc;
}

input:focus,
select:focus,
textarea:focus {
  border-color: #2563eb;
  background: white;
  box-shadow: 0 0 8px rgba(37,99,235,0.2);
}

textarea {
  min-height: 90px;
  resize: vertical;
}

button {
  border: none;
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  font-size: 14px;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.95;
}

.btn-principal {
  width: 100%;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: white;
}

.btn-aprobar {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
}

.btn-rechazar {
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  font-size: 14px;
}

th {
  background: #2563eb;
  color: white;
  padding: 12px;
  text-align: left;
}

td {
  padding: 12px;
  border-bottom: 1px solid #e5e7eb;
  color: #334155;
}

tr:hover {
  background: #eff6ff;
}

#mensaje,
#contador,
#loading {
  margin-top: 15px;
  font-weight: 600;
  font-size: 14px;
}

#mensaje {
  text-align: center;
}

#loading {
  color: #2563eb;
}
</style>
